<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Stopwatch" />
<meta name="theme-color" content="#0a0a0a" />
<title>Multi-stopwatch</title>

<!-- Home-screen icon: orange flag mark on near-black -->
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230a0a0a'/><circle cx='90' cy='90' r='52' fill='none' stroke='%23ff6b35' stroke-width='10'/><rect x='86' y='42' width='8' height='52' rx='4' fill='%23f5f5f5'/><rect x='86' y='86' width='8' height='12' rx='2' fill='%23ff6b35'/></svg>" />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230a0a0a'/><circle cx='16' cy='16' r='9' fill='none' stroke='%23ff6b35' stroke-width='2'/><rect x='15' y='8' width='2' height='9' rx='1' fill='%23f5f5f5'/></svg>" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body, #root {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #0a0a0a; color: #f5f5f5;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }
  * { box-sizing: border-box; }
  /* Account for iOS notch / home indicator. Inner app uses these. */
  .app-root {
    height: 100dvh;
    overflow: hidden;
    position: relative;
    background: #0a0a0a;
    /* Combined flow uses --top-spacer for nav-bar room. On real device,
       grow it to clear the notch. Min 16px so non-notched browsers still
       have breathing room. */
    --top-spacer: max(16px, env(safe-area-inset-top));
    padding-bottom: env(safe-area-inset-bottom);
  }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="stopwatch-core.jsx"></script>
<script type="text/babel" src="stopwatch-variations.jsx"></script>
<script type="text/babel" src="stopwatch-combined.jsx"></script>

<script type="text/babel">
  // Mobile shell: full-viewport wrapper around the Combined flow. Strips the
  // iPhone bezel & design canvas — this is meant to BE the app, run from
  // Safari → Add to Home Screen.
  function MobileApp() {
    return (
      <div className="app-root">
        <VariationCombined />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<MobileApp />);
</script>

<!-- Bundler thumbnail (unused on phone, used by single-file bundler splash) -->
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#0a0a0a"/>
    <circle cx="50" cy="55" r="22" fill="none" stroke="#ff6b35" stroke-width="3"/>
    <rect x="48.5" y="28" width="3" height="24" rx="1.5" fill="#f5f5f5"/>
  </svg>
</template>
</body>
</html>
